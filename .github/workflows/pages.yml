name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build static web (Expo export)
        run: npm run export:web

      - name: Insert base href for GitHub Pages
        run: |
          repo=${GITHUB_REPOSITORY##*/}
          node ./scripts/set-base.js "$repo"

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Copy index to 404 (SPA fallback)
        run: cp dist/index.html dist/404.html || true

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
